name: Objdiff Report

on:
  # Disabled: re-enable when ready for CI validation
  # push:
  # pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  objdiff_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - uses: ./.github/actions/python_prep

    - uses: ./.github/actions/clang_prep

    - name: Download objdiff-cli
      run: |
        curl -L https://github.com/encounter/objdiff/releases/download/v3.6.1/objdiff-cli-linux-x86_64 -o objdiff-cli
        chmod +x objdiff-cli

    - name: Configure objdiff
      run: python configure_objdiff.py

    - name: Run objdiff report
      run: ./objdiff-cli -C cmake-build-presets/objdiff report generate -o report.json

    - name: Strip workspace path from report
      run: sed -i 's|${{ github.workspace }}/||g' cmake-build-presets/objdiff/report.json

    - name: Upload objdiff report
      uses: actions/upload-artifact@v4
      with:
        name: WIN32_1.20_EN_report
        path: cmake-build-presets/objdiff/report.json

    - name: Generate progress image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        pip install matplotlib squarify
        python scripts/decompilation/generate_progress_image.py cmake-build-presets/objdiff/report.json progress.png

    - name: Commit progress image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add progress.png
        git diff --cached --quiet || git commit -m "chore: Update progress image [skip ci]"
        git pull --rebase
        git push
