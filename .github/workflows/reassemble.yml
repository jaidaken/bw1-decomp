name: Reassemble

on: [push, pull_request]

jobs:
  reassemble:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]

    runs-on: ${{ matrix.os }}-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - uses: ./.github/actions/python_prep

    - uses: ./.github/actions/clang_prep

    - name: Build bw1-decomp project
      uses: ./.github/actions/clang_build
      with:
        configuration: Release
        build_dir: build

    - name: Upload release binary
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.os }}
        path: build/runblack-reassembled.exe

    - name: Upload build dir on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-build-${{ matrix.os }}
        path: build/

    - name: Build bw1-decomp project (RelWithDebInfo)
      uses: ./.github/actions/clang_build
      with:
        configuration: RelWithDebInfo
        build_dir: build_debug

    - name: Upload RelWithDebInfo binary (with PDB)
      uses: actions/upload-artifact@v4
      with:
        name: relwithdebinfo-${{ matrix.os }}
        path: |
          build_debug/runblack-reassembled.exe
          build_debug/runblack-reassembled.exe.pdb
