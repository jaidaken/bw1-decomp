name: Progress Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  progress_image:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install matplotlib squarify

    - name: Generate source report
      run: python scripts/decompilation/generate_source_report.py -o report.json

    - name: Generate progress image
      run: python scripts/decompilation/generate_progress_image.py report.json progress.png

    - name: Commit progress image
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add progress.png
        git diff --cached --quiet || git commit -m "chore: update progress image [skip ci]"
        git pull --rebase
        git push
